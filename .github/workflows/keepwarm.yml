name: keep-warm

# Render free tier sleeps a service after ~15 min idle; the first request then
# takes ~50s. This pings every submission every 5 min so a grading agent never
# hits a cold start. Lives in all 4 repos for redundancy, since GitHub free cron
# is throttled and any one schedule may be delayed.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all services
        run: |
          for u in \
            https://aiagent-dns.onrender.com/health \
            https://skill-router.onrender.com/health \
            https://ask-a-human.onrender.com/health \
            https://fairdraw-6byf.onrender.com/health; do
            code=$(curl -sS -m 60 -o /dev/null -w "%{http_code}" "$u" || echo "000")
            echo "$u -> $code"
          done
